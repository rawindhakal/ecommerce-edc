# Nginx reverse proxy for edc.cakezake.com → Next.js on port 3000
# Place at: /etc/nginx/sites-available/edc.cakezake.com
# Enable:   ln -s /etc/nginx/sites-available/edc.cakezake.com /etc/nginx/sites-enabled/
# Test:     nginx -t   then   systemctl reload nginx
# SSL:      certbot --nginx -d edc.cakezake.com   (auto-edits this file)

server {
    listen 80;
    listen [::]:80;
    server_name edc.cakezake.com;

    # Allow large product image uploads / CSV imports
    client_max_body_size 25M;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
